name: livelong_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  image_picker: ^0.8.3+2
  firebase_storage: ^11.6.9
  excel: ^4.0.6
  file_picker: ^8.0.0+1








# dependency_overrides removed: pdf_widget_wrapper вызывал ошибку сборки на Android.


dev_dependencies:
  flutter_test:
    sdk: flutter
  http: ^0.13.3
  flutter_svg: ^1.1.2
  flutter_gif: any
  image_picker: ^0.8.6+1
  path_provider: ^2.0.11
  table_calendar: ^3.0.0
  provider: ^6.0.5
  lottie: ^1.4.3
  circular_countdown_timer: ^0.2.1
